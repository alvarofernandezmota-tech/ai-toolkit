# LiteLLM Proxy Config — Colmena simplificada
# Arrancar: bash scripts/start-colmena.sh --colmena-full
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-23
#
# ESTRATEGIA: OpenRouter gratis primero, Ollama local como alternativa privada
# Solo se usan proveedores con key activa
#
# KEYS NECESARIAS (en .env o ~/.bashrc):
#   OPENROUTER_API_KEY=sk-or-v1-...   ← OBLIGATORIA
#
# KEYS OPCIONALES (a renovar):
#   GROQ_API_KEY          → console.groq.com
#   GEMINI_API_KEY        → aistudio.google.com
#   CEREBRAS_API_KEY      → inference.cerebras.ai
#
# OLLAMA LOCAL:
#   ollama pull qwen3:8b   ← modelo local instalado
#   VRAM: solo modelos 8B o menos (6GB VRAM)

model_list:

  # ─── PRINCIPAL: OpenRouter gratis primero ─────────────────────────────
  - model_name: principal
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  # Ollama local como último fallback del principal
  - model_name: principal
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://localhost:11434
      max_tokens: 4096

  # ─── MODELOS INDIVIDUALES ───────────────────────────────────────────
  - model_name: qwen3-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: llama-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: gpt-oss-120b
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: kimi-k2
    litellm_params:
      model: openrouter/moonshot/kimi-k2
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: ollama-fast
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://localhost:11434
      max_tokens: 4096

  # ─── OPCIONALES (solo si tienes key) ──────────────────────────────
  - model_name: groq-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-03-25
      api_key: os.environ/GEMINI_API_KEY

  - model_name: cerebras-fast
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

router_settings:
  routing_strategy: least-busy
  num_retries: 2
  retry_after: 0
  cooldown_time: 10
  allowed_fails: 2
  fallbacks:
    - {"principal": ["qwen3-coder", "llama-70b", "gpt-oss-120b", "ollama-fast"]}
    - {"qwen3-coder": ["llama-70b", "gpt-oss-120b", "ollama-fast"]}
    - {"llama-4-scout": ["qwen3-coder", "llama-70b", "ollama-fast"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 60

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
