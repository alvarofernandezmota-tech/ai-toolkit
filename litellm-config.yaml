# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: bash scripts/start-colmena.sh
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-16 04:19 (fix fallbacks: openrouter/gemini primero para evitar cooldown total)
#
# ORDEN DE PRIORIDAD (principal):
#   1. Groq          → llama-3.3-70b-versatile   ✅ 6000 req/día
#   2. Sambanova     → Llama-4-Maverick           ✅ gratis
#   3. Together AI   → Llama-4-Maverick           ✅ $1 crédito
#   4. OpenRouter    → llama-4-scout:free         ✅ fallback
#   5. Gemini Flash  → gemini-2.0-flash           ⚠️  1500 req/día
#   6. Gemini Lite   → gemini-2.0-flash-lite      ✅ más cuota gratis
#   7. Cerebras      → llama3.1-8b               ⚠️  límite diario
#
# ESTADO 2026-04-16:
#   Groq             → ✅ operativo
#   Sambanova        → ✅ key activa
#   Together AI      → ✅ key activa
#   Gemini           → ⚠️  rate limit frecuente (free tier)
#   Cerebras         → ⚠️  límite diario variable
#   OpenRouter       → ✅ fallback gratis
#   DeepSeek         → ❌ AuthenticationError
#
# VARIABLES DE ENTORNO REQUERIDAS (~/.bashrc):
#   GROQ_API_KEY                 → ✅ gsk_KQduif...
#   SAMBANOVA_API_KEY            → ✅ 7fe869f3-...
#   TOGETHER_API_KEY             → ✅ tgp_v1_...
#   GOOGLE_GENERATIVE_AI_API_KEY → ⚠️  rate limit frecuente
#   CEREBRAS_API_KEY             → ⚠️  límite diario
#   OPENROUTER_API_KEY           → ✅ fallback
#   ANTHROPIC_API_KEY            → de pago
#   OPENAI_API_KEY               → de pago
#   MISTRAL_API_KEY              → de pago

model_list:

  # ─── PRINCIPAL (orden de prioridad, fallback automático) ──────────────
  # 1. Groq: más rápido y fiable gratis
  - model_name: principal
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  # 2. Sambanova: llama-4 gratis, alta calidad
  - model_name: principal
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  # 3. Together AI: llama-4, $1 crédito
  - model_name: principal
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  # 4. OpenRouter: fallback gratis
  - model_name: principal
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # 5. Gemini Flash: penúltimo (rate limit frecuente en free tier)
  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # 6. Gemini Flash Lite: más cuota gratis que Flash
  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # 7. Cerebras: último, llama3.1-8b (llama3.3-70b NO existe en Cerebras)
  - model_name: principal
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  # ─── GOOGLE ──────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-exp-03-25
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── ANTHROPIC ───────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OPENAI ──────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── SAMBANOVA ✅ ─────────────────────────────────────────────────────
  - model_name: sambanova-llama4
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  - model_name: sambanova-deepseek
    litellm_params:
      model: sambanova/DeepSeek-R1-0528
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  - model_name: sambanova-deepseek-v3
    litellm_params:
      model: sambanova/DeepSeek-V3-0324
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  # ─── TOGETHER AI ✅ ───────────────────────────────────────────────────
  - model_name: together-llama4
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  - model_name: together-deepseek
    litellm_params:
      model: together_ai/deepseek-ai/DeepSeek-R1
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  # ─── META (vía OpenRouter) ───────────────────────────────────────────
  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # ─── ALIBABA (vía Cerebras) ──────────────────────────────────────────
  - model_name: qwen3-235b
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  # ─── MISTRAL ─────────────────────────────────────────────────────────
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ─── GROQ ✅ ──────────────────────────────────────────────────────────
  - model_name: groq-fallback
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  # ─── FALLBACKS ───────────────────────────────────────────────────────
  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: gemini-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-lite-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: together-fallback
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  - model_name: sambanova-fallback
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

router_settings:
  routing_strategy: least-busy
  num_retries: 2
  retry_after: 1
  cooldown_time: 60       # Reducido a 1 min (era 5 min) para recuperarse antes
  allowed_fails: 2        # 2 fallos antes de cooldown (era 1)
  fallbacks:
    # principal: openrouter y gemini PRIMERO para evitar que cooldown de groq/sambanova bloquee todo
    - {"principal": ["openrouter-fallback", "together-fallback", "sambanova-fallback", "gemini-fallback", "gemini-lite-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"openrouter-fallback": ["together-fallback", "sambanova-fallback", "gemini-fallback", "gemini-lite-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"groq-fallback": ["openrouter-fallback", "together-fallback", "sambanova-llama4", "sambanova-fallback", "gemini-fallback", "gemini-lite-fallback", "cerebras-fallback"]}
    - {"cerebras-fallback": ["openrouter-fallback", "together-fallback", "sambanova-fallback", "gemini-fallback", "gemini-lite-fallback", "groq-fallback"]}
    - {"gemini-fallback": ["gemini-lite-fallback", "openrouter-fallback", "together-fallback", "sambanova-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"gemini-lite-fallback": ["openrouter-fallback", "together-fallback", "sambanova-fallback", "gemini-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"together-fallback": ["openrouter-fallback", "sambanova-fallback", "gemini-fallback", "gemini-lite-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"sambanova-fallback": ["openrouter-fallback", "together-fallback", "gemini-fallback", "gemini-lite-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"gemini-flash": ["openrouter-fallback", "together-fallback", "sambanova-fallback", "groq-fallback", "gemini-lite-fallback", "cerebras-fallback"]}
    - {"claude-sonnet": ["gpt-4o", "openrouter-fallback", "sambanova-fallback", "together-fallback"]}
    - {"sambanova-llama4": ["openrouter-fallback", "together-fallback", "groq-fallback", "gemini-fallback", "cerebras-fallback"]}
    - {"together-llama4": ["openrouter-fallback", "sambanova-fallback", "groq-fallback", "gemini-fallback", "cerebras-fallback"]}
  context_window_fallbacks:
    - {"principal": ["openrouter-fallback"]}
    - {"cerebras-fallback": ["openrouter-fallback"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 60

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
