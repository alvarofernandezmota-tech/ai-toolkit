# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: bash scripts/start-colmena.sh
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-15 (fix: fallbacks robustos, DeepSeek desactivado)
#
# VARIABLES DE ENTORNO NECESARIAS (en ~/.bashrc o .env):
#   CEREBRAS_API_KEY          → ⭐ PRINCIPAL — gratis, rápido, 128K contexto
#   DEEPSEEK_API_KEY          → ⚠️  DESACTIVADO — AuthenticationError, renovar key
#   GROQ_API_KEY              → fallback rápido gratis (límite 12K TPM — NO usar con contextos grandes)
#   GOOGLE_GENERATIVE_AI_API_KEY → solo usar directamente, NO como fallback
#   OPENROUTER_API_KEY        → ⭐ FALLBACK PRINCIPAL — llama-4-maverick:free, sin límite diario conocido
#   ANTHROPIC_API_KEY         → de pago
#   OPENAI_API_KEY            → de pago
#   MISTRAL_API_KEY           → de pago
#
# HISTORIAL PRINCIPAL:
#   Groq llama-3.3-70b → 401 (key caducada)
#   Gemini Flash → 429 (free tier agotado con agentes)
#   DeepSeek V3 → fallbacks apuntaban a Gemini — mismo problema
#   Cerebras llama3.1-70b → 404 nombre incorrecto
#   Cerebras llama-3.3-70b → 404 DEPRECADO (ya no es modelo de producción)
#   Cerebras gpt-oss-120b → modelo de producción actual ✅
#   ContextWindowExceeded 13K>8K → fix: context_window_fallbacks → deepseek-v3 ✅
#   DeepSeek → AuthenticationError (2026-04-15) ⚠️  DESACTIVADO en fallbacks
#   Groq → RateLimitError 32K>12K TPM (2026-04-15) — solo válido para contextos pequeños
#   Cerebras → daily token limit (2026-04-15) — fix: OpenRouter como fallback principal
#
# MODELOS PRODUCCIÓN CEREBRAS (docs: inference-docs.cerebras.ai/models/overview):
#   llama3.1-8b   → 8B,  ~2200 tok/s
#   gpt-oss-120b  → 120B, ~3000 tok/s  ⭐ MEJOR OPCIÓN
#
# REGLA DE ORO: NUNCA poner modelos Gemini en fallbacks automáticos.
# REGLA 2: Groq solo para contextos < 8K tokens (TPM limit 12K).
# REGLA 3: DeepSeek desactivado en fallbacks hasta renovar API key.

model_list:

  # ─── PRINCIPAL (default) ───────────────────────────────────────────────
  # Cerebras gpt-oss-120b: 120B, ~3000 tok/s, modelo de producción actual
  - model_name: principal
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY

  # Cerebras llama3.1-8b: 8B ligero, ~2200 tok/s, fallback rápido
  - model_name: principal
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  # Llama 4 Maverick vía OpenRouter (gratis): fallback si Cerebras cae
  - model_name: principal
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── GOOGLE (solo uso manual, NO en fallbacks) ────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-exp-03-25
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── ANTHROPIC ──────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OPENAI ─────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── DEEPSEEK ⚠️  DESACTIVADO — AuthenticationError ────────────────
  # Reactivar cuando se renueve DEEPSEEK_API_KEY
  # - model_name: deepseek-r1
  #   litellm_params:
  #     model: deepseek/deepseek-reasoner
  #     api_key: os.environ/DEEPSEEK_API_KEY

  # - model_name: deepseek-v3
  #   litellm_params:
  #     model: deepseek/deepseek-chat
  #     api_key: os.environ/DEEPSEEK_API_KEY

  # ─── META (vía OpenRouter) ──────────────────────────────────────
  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── ALIBABA (vía OpenRouter) ───────────────────────────────────
  - model_name: qwen3-235b
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── MISTRAL ─────────────────────────────────────────────────────
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ─── VELOCIDAD GRATIS ─────────────────────────────────────────────
  # ⚠️  groq-fallback: solo para contextos < 8K tokens (TPM limit: 12K)
  - model_name: groq-fallback
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick:free
      api_key: os.environ/OPENROUTER_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 3
  cooldown_time: 30
  fallbacks:
    # ⚠️  REGLA: Gemini NUNCA en fallbacks automáticos
    # ⚠️  REGLA: Groq solo contextos < 8K tokens
    # ⚠️  REGLA: DeepSeek desactivado hasta renovar key
    - {"principal": ["openrouter-fallback", "groq-fallback"]}
    - {"deepseek-r1": ["qwen3-235b", "llama-4-maverick"]}
    - {"deepseek-v3": ["openrouter-fallback", "cerebras-fallback"]}
    - {"claude-sonnet": ["gpt-4o", "openrouter-fallback"]}
    - {"gemini-flash": ["openrouter-fallback"]}
    - {"groq-fallback": ["cerebras-fallback", "openrouter-fallback"]}
    - {"cerebras-fallback": ["openrouter-fallback"]}
  context_window_fallbacks:
    - {"principal": ["llama-4-maverick"]}
    - {"groq-fallback": ["llama-4-maverick"]}
    - {"cerebras-fallback": ["llama-4-maverick"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
