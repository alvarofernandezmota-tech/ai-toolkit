# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: litellm --config litellm-config.yaml --port 4000
# OpenCode apunta a: http://localhost:4000

model_list:

  # Google AI - 1M tokens contexto
  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # Groq - velocidad maxima
  - model_name: groq-fallback
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # Cerebras - rapido
  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  # OpenRouter - fallback final
  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/deepseek/deepseek-r1:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Alias compatibilidad
  - model_name: gpt-4o
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 5
  cooldown_time: 60
  # Fallbacks: si "principal" falla, intenta estos en orden
  fallbacks:
    - {"principal": ["groq-fallback", "cerebras-fallback", "openrouter-fallback"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

general_settings:
  port: 4000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
