# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: bash scripts/start-colmena.sh
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-15 (fix: gemini-flash principal emergencia nocturna)
#
# ⚠️  ESTADO 2026-04-15 NOCHE:
#   Cerebras  → daily limit agotado (se resetea mañana) 
#   OpenRouter → 402 sin créditos suficientes
#   Groq      → 401 key caducada
#   DeepSeek  → AuthenticationError
#   Gemini    → ✅ OPERATIVO — principal esta noche
#
# VARIABLES DE ENTORNO:
#   CEREBRAS_API_KEY             → ⭐ PRINCIPAL normal (mañana se resetea)
#   DEEPSEEK_API_KEY             → ⚠️  renovar key en platform.deepseek.com
#   GROQ_API_KEY                 → ⚠️  renovar key en console.groq.com
#   GOOGLE_GENERATIVE_AI_API_KEY → ✅ operativo
#   OPENROUTER_API_KEY           → ⚠️  recargar en openrouter.ai/settings/credits
#   ANTHROPIC_API_KEY            → de pago
#   OPENAI_API_KEY               → de pago
#   MISTRAL_API_KEY              → de pago
#
# REGLAS:
#   1. Gemini NUNCA en fallbacks automáticos con agentes (429) — OK para chat normal
#   2. Groq DESACTIVADO hasta renovar key
#   3. DeepSeek DESACTIVADO hasta renovar key
#   4. Mañana: restaurar Cerebras como principal y Gemini como fallback

model_list:

  # ─── PRINCIPAL (esta noche: Gemini) ───────────────────────────────────
  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # Cerebras: vuelve mañana cuando se resetee el daily limit
  - model_name: principal
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY

  - model_name: principal
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  # ─── GOOGLE ──────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-exp-03-25
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── ANTHROPIC ───────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OPENAI ──────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── DEEPSEEK ⚠️  DESACTIVADO ────────────────────────────────────────
  # - model_name: deepseek-r1
  #   litellm_params:
  #     model: deepseek/deepseek-reasoner
  #     api_key: os.environ/DEEPSEEK_API_KEY
  # - model_name: deepseek-v3
  #   litellm_params:
  #     model: deepseek/deepseek-chat
  #     api_key: os.environ/DEEPSEEK_API_KEY

  # ─── META (vía OpenRouter) ───────────────────────────────────────────
  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── ALIBABA (vía OpenRouter) ────────────────────────────────────────
  - model_name: qwen3-235b
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── MISTRAL ─────────────────────────────────────────────────────────
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ─── GROQ ⚠️  DESACTIVADO ────────────────────────────────────────────
  # - model_name: groq-fallback
  #   litellm_params:
  #     model: groq/llama-3.3-70b-versatile
  #     api_key: os.environ/GROQ_API_KEY

  # ─── FALLBACKS ───────────────────────────────────────────────────────
  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: gemini-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 3
  cooldown_time: 30
  fallbacks:
    - {"principal": ["gemini-fallback", "openrouter-fallback"]}
    - {"openrouter-fallback": ["gemini-fallback"]}
    - {"cerebras-fallback": ["gemini-fallback", "openrouter-fallback"]}
    - {"deepseek-r1": ["qwen3-235b", "llama-4-maverick"]}
    - {"deepseek-v3": ["gemini-fallback", "openrouter-fallback"]}
    - {"claude-sonnet": ["gpt-4o", "gemini-fallback"]}
    - {"gemini-flash": ["openrouter-fallback"]}
  context_window_fallbacks:
    - {"principal": ["gemini-fallback"]}
    - {"cerebras-fallback": ["gemini-fallback"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
