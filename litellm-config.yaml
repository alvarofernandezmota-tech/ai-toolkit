# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: litellm --config litellm-config.yaml --port 8000
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-15 (fix: principal → gemini-flash, fallbacks limpios)
#
# VARIABLES DE ENTORNO NECESARIAS (en ~/.bashrc o .env):
#   GOOGLE_GENERATIVE_AI_API_KEY → gratis (limitado por RPM)
#   OPENROUTER_API_KEY        → gratis (modelos :free)
#   ANTHROPIC_API_KEY         → de pago
#   OPENAI_API_KEY            → de pago
#   DEEPSEEK_API_KEY          → muy barato
#   MISTRAL_API_KEY           → de pago
#   GROQ_API_KEY              → gratis PERO límite 8K contexto en fallback
#   CEREBRAS_API_KEY          → gratis PERO límite 8K contexto — NO usar como fallback de tareas largas
#
# NOTAS:
#   - groq-fallback y cerebras-fallback solo sirven para prompts cortos (<6K tokens)
#   - Para tareas largas (agentes, comparativas) usar gemini-flash o deepseek-v3
#   - Si Groq da 401: verificar GROQ_API_KEY en ~/.bashrc

model_list:

  # ─── PRINCIPAL (default) ────────────────────────────────────────────────────
  # Gemini 2.0 Flash: gratis, 1M contexto, rápido
  # ⚠️ Groq fue principal antes pero da 401 cuando la key caduca — no es fiable como default
  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── GOOGLE ─────────────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-exp-03-25
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── ANTHROPIC ──────────────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OPENAI ─────────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── DEEPSEEK ───────────────────────────────────────────────────────────────
  - model_name: deepseek-r1
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-v3
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # ─── META (vía OpenRouter) ───────────────────────────────────────────────────
  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── ALIBABA (vía OpenRouter) ────────────────────────────────────────────────
  - model_name: qwen3-235b
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ─── MISTRAL ─────────────────────────────────────────────────────────────────
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ─── FALLBACKS VELOCIDAD (contexto corto <6K tokens) ─────────────────────────
  # ⚠️ Groq y Cerebras tienen límite de 8K tokens — NO usar para tareas de agente largas
  - model_name: groq-fallback
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 5
  cooldown_time: 60
  fallbacks:
    # principal (gemini-flash) → deepseek-v3 → gemini-flash-lite
    # ⚠️ Se eliminaron groq/cerebras de fallbacks de principal: límite 8K rompe tareas de agente
    - {"principal": ["deepseek-v3", "gemini-flash-lite"]}
    - {"gemini-flash": ["gemini-flash-lite", "deepseek-v3"]}
    - {"gemini-pro": ["gemini-flash", "deepseek-v3"]}
    - {"claude-sonnet": ["gpt-4o", "deepseek-v3"]}
    - {"deepseek-r1": ["qwen3-235b", "deepseek-v3"]}
    - {"groq-fallback": ["cerebras-fallback"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
