# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: bash scripts/start-colmena.sh
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-18 01:28 (fix: variable Gemini unificada a GOOGLE_GENERATIVE_AI_API_KEY)
#
# ORDEN DE PRIORIDAD (principal):
#   1. Ollama qwen2.5-coder:14b  → LOCAL sin límites ✅ PRIMERO
#   2. Ollama deepseek-r1:14b    → LOCAL razonamiento ✅
#   3. Ollama qwen3:8b           → LOCAL rápido ✅
#   4. Groq                      → llama-3.3-70b-versatile  ⚠️  6000 req/día
#   5. Sambanova                 → Llama-4-Maverick          ⚠️  429 frecuente
#   6. Together AI               → Llama-4-Maverick          ⚠️  $1 crédito
#   7. OpenRouter                → llama-4-scout             ⚠️  límite
#   8. Cerebras                  → llama3.1-8b               ⚠️  límite diario
#   9. Gemini Flash              → gemini-2.0-flash          ❌  key pendiente renovar en aistudio.google.com
#  10. Gemini Lite               → gemini-2.0-flash-lite     ❌  key pendiente renovar en aistudio.google.com
#
# ESTADO 2026-04-17 01:48:
#   Ollama local     → ✅ operativo, sin límites, código NO sale de la máquina
#   Groq             → ⚠️  429 rate limit (TPM 12000 superado con contextos grandes)
#   Gemini           → ❌  cuota diaria agotada
#
# FIX APLICADO 2026-04-17 01:48:
#   - request_timeout subido de 15s a 120s
#   - Ollama tarda ~30-60s en cargar modelo en RAM la primera vez
#   - Con 15s se agotaba el timeout y caía a APIs de nube innecesariamente
#   - Con 120s Ollama local responde siempre sin tocar APIs externas
#
# PREREQUISITOS OLLAMA:
#   ollama pull qwen2.5-coder:14b
#   ollama pull deepseek-r1:14b
#   ollama pull qwen3:8b-q4_K_M

model_list:

  # ─── PRINCIPAL: OLLAMA LOCAL PRIMERO ─────────────────────────────────────────
  - model_name: principal
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://localhost:11434
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: ollama/deepseek-r1:14b
      api_base: http://localhost:11434
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: ollama/qwen3:8b-q4_K_M
      api_base: http://localhost:11434
      max_tokens: 4096

  # ─── PRINCIPAL: APIs NUBE (fallback si local no disponible) ──────────────────
  - model_name: principal
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  - model_name: principal
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: principal
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: principal
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── MODELOS OLLAMA INDIVIDUALES ─────────────────────────────────────────────
  - model_name: ollama-coder
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://localhost:11434
      max_tokens: 8192

  - model_name: ollama-deepseek
    litellm_params:
      model: ollama/deepseek-r1:14b
      api_base: http://localhost:11434
      max_tokens: 8192

  - model_name: ollama-fast
    litellm_params:
      model: ollama/qwen3:8b-q4_K_M
      api_base: http://localhost:11434
      max_tokens: 4096

  # ─── GOOGLE ──────────────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-exp-03-25
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── ANTHROPIC ───────────────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OPENAI ──────────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── SAMBANOVA ───────────────────────────────────────────────────────────────
  - model_name: sambanova-llama4
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  - model_name: sambanova-deepseek
    litellm_params:
      model: sambanova/DeepSeek-R1-0528
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  - model_name: sambanova-deepseek-v3
    litellm_params:
      model: sambanova/DeepSeek-V3-0324
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

  # ─── TOGETHER AI ─────────────────────────────────────────────────────────────
  - model_name: together-llama4
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  - model_name: together-deepseek
    litellm_params:
      model: together_ai/deepseek-ai/DeepSeek-R1
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  # ─── META (vía OpenRouter) ───────────────────────────────────────────────────
  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # ─── ALIBABA (vía Cerebras) ──────────────────────────────────────────────────
  - model_name: qwen3-235b
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  # ─── MISTRAL ─────────────────────────────────────────────────────────────────
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ─── GROQ ────────────────────────────────────────────────────────────────────
  - model_name: groq-fallback
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 8192

  # ─── FALLBACKS NUBE ──────────────────────────────────────────────────────────
  - model_name: ollama-fallback
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://localhost:11434
      max_tokens: 8192

  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: gemini-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-lite-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: together-fallback
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      max_tokens: 8192

  - model_name: sambanova-fallback
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: os.environ/SAMBANOVA_API_KEY
      max_tokens: 8192

router_settings:
  routing_strategy: least-busy
  num_retries: 1
  retry_after: 0
  cooldown_time: 30
  allowed_fails: 3
  fallbacks:
    - {"principal": ["ollama-fallback", "groq-fallback", "together-fallback", "sambanova-fallback", "openrouter-fallback", "cerebras-fallback", "gemini-fallback", "gemini-lite-fallback"]}
    - {"openrouter-fallback": ["ollama-fallback", "together-fallback", "sambanova-fallback", "groq-fallback", "cerebras-fallback", "gemini-fallback", "gemini-lite-fallback"]}
    - {"groq-fallback": ["ollama-fallback", "together-fallback", "sambanova-fallback", "openrouter-fallback", "cerebras-fallback", "gemini-fallback", "gemini-lite-fallback"]}
    - {"cerebras-fallback": ["ollama-fallback", "together-fallback", "sambanova-fallback", "openrouter-fallback", "groq-fallback", "gemini-fallback", "gemini-lite-fallback"]}
    - {"gemini-fallback": ["ollama-fallback", "gemini-lite-fallback", "together-fallback", "sambanova-fallback", "openrouter-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"gemini-lite-fallback": ["ollama-fallback", "together-fallback", "sambanova-fallback", "openrouter-fallback", "groq-fallback", "cerebras-fallback"]}
    - {"together-fallback": ["ollama-fallback", "sambanova-fallback", "openrouter-fallback", "groq-fallback", "cerebras-fallback", "gemini-fallback", "gemini-lite-fallback"]}
    - {"sambanova-fallback": ["ollama-fallback", "together-fallback", "openrouter-fallback", "groq-fallback", "cerebras-fallback", "gemini-fallback", "gemini-lite-fallback"]}
    - {"gemini-flash": ["ollama-fallback", "together-fallback", "sambanova-fallback", "openrouter-fallback", "groq-fallback", "gemini-lite-fallback", "cerebras-fallback"]}
    - {"claude-sonnet": ["gpt-4o", "openrouter-fallback", "ollama-fallback", "sambanova-fallback", "together-fallback"]}
    - {"sambanova-llama4": ["ollama-fallback", "together-fallback", "openrouter-fallback", "groq-fallback", "gemini-fallback", "cerebras-fallback"]}
    - {"together-llama4": ["ollama-fallback", "sambanova-fallback", "openrouter-fallback", "groq-fallback", "gemini-fallback", "cerebras-fallback"]}
  context_window_fallbacks:
    - {"principal": ["openrouter-fallback", "ollama-fallback"]}
    - {"cerebras-fallback": ["openrouter-fallback", "ollama-fallback"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120  # ← SUBIDO de 15s a 120s para Ollama local (carga modelo en RAM)

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
