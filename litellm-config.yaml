# LiteLLM Proxy Config — Arquitectura Colmena
# Arrancar: bash scripts/start-colmena.sh
# OpenCode apunta a: http://localhost:8000
# Última actualización: 2026-04-16 (fix: OpenRouter y Cerebras confirmados 200)
#
# ESTADO REAL 2026-04-16 00:04:
#   Cerebras  → ✅ 200 (gpt-oss-120b, llama3.1-8b, qwen-3-235b-a22b-instruct-2507)
#   OpenRouter → ✅ 200 (problema era max_tokens=8192 > saldo — limitado a 4096)
#   Gemini    → ❌ 429 rate limit (demasiadas peticiones esta noche)
#   Groq      → ❌ 401 key caducada
#   DeepSeek  → ❌ AuthenticationError
#
# VARIABLES DE ENTORNO:
#   CEREBRAS_API_KEY             → ✅ operativo
#   GOOGLE_GENERATIVE_AI_API_KEY → ⚠️  429 esta noche, mañana ok
#   OPENROUTER_API_KEY           → ✅ operativo (max_tokens <= 5501)
#   DEEPSEEK_API_KEY             → ⚠️  renovar en platform.deepseek.com
#   GROQ_API_KEY                 → ⚠️  renovar en console.groq.com
#   ANTHROPIC_API_KEY            → de pago
#   OPENAI_API_KEY               → de pago
#   MISTRAL_API_KEY              → de pago

model_list:

  # ─── PRINCIPAL ───────────────────────────────────────────────────────
  # Cerebras primero: gratis, rápido, 128K contexto
  - model_name: principal
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  - model_name: principal
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  # OpenRouter: 200 confirmado, limitado a 4096 para no exceder saldo
  - model_name: principal
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # ─── GOOGLE ──────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-exp-03-25
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

  # ─── ANTHROPIC ───────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OPENAI ──────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── DEEPSEEK ⚠️  DESACTIVADO ────────────────────────────────────────
  # - model_name: deepseek-r1
  #   litellm_params:
  #     model: deepseek/deepseek-reasoner
  #     api_key: os.environ/DEEPSEEK_API_KEY
  # - model_name: deepseek-v3
  #   litellm_params:
  #     model: deepseek/deepseek-chat
  #     api_key: os.environ/DEEPSEEK_API_KEY

  # ─── META (vía OpenRouter) ───────────────────────────────────────────
  - model_name: llama-4-maverick
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # ─── ALIBABA ─────────────────────────────────────────────────────────
  # Cerebras tiene qwen-3-235b nativo (más rápido que OpenRouter)
  - model_name: qwen3-235b
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  # ─── MISTRAL ─────────────────────────────────────────────────────────
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: codestral
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ─── GROQ ⚠️  DESACTIVADO (401 key caducada) ─────────────────────────
  # - model_name: groq-fallback
  #   litellm_params:
  #     model: groq/llama-3.3-70b-versatile
  #     api_key: os.environ/GROQ_API_KEY

  # ─── FALLBACKS ───────────────────────────────────────────────────────
  - model_name: cerebras-fallback
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      max_tokens: 4096

  - model_name: openrouter-fallback
    litellm_params:
      model: openrouter/meta-llama/llama-4-maverick
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: gemini-fallback
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_GENERATIVE_AI_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 3
  cooldown_time: 30
  fallbacks:
    - {"principal": ["openrouter-fallback", "gemini-fallback"]}
    - {"openrouter-fallback": ["cerebras-fallback", "gemini-fallback"]}
    - {"cerebras-fallback": ["openrouter-fallback", "gemini-fallback"]}
    - {"deepseek-r1": ["qwen3-235b", "llama-4-maverick"]}
    - {"deepseek-v3": ["openrouter-fallback", "cerebras-fallback"]}
    - {"claude-sonnet": ["gpt-4o", "openrouter-fallback"]}
    - {"gemini-flash": ["openrouter-fallback", "cerebras-fallback"]}
  context_window_fallbacks:
    - {"principal": ["openrouter-fallback"]}
    - {"cerebras-fallback": ["openrouter-fallback"]}

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

general_settings:
  port: 8000
  host: "0.0.0.0"
  master_key: "sk-litellm-local"
  env_file: .env
